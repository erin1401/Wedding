<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wedding Invitation</title>
  <link rel="stylesheet" href="style.css">

  <!-- font elegan -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body>

<div class="wrapper">

  <!-- ===== NAMA (tidak nempel amplop lagi) ===== -->
  <div class="title">
    <h1>Nur Indrayakni & Muhammad Erfan</h1>
    <p>Wedding Invitation</p>
  </div>


  <!-- ===== AMPLOP ===== -->
  <div class="envelope" id="envelope">

      <div class="flap"></div>

      <div class="body">

        <!-- monogram -->
        <div class="monogram">IE</div>

        <!-- segel emas -->
        <div class="seal">
          <svg viewBox="0 0 100 100">
            <path d="M50 10 C70 35 90 45 50 90 C10 45 30 35 50 10"
              fill="#d4af37"/>
          </svg>
        </div>

        <!-- surat -->
        <div class="letter" id="letter">
            <h2>Akad Nikah</h2>
            <p>Sabtu, 12 April 2026<br>09.00 WIB</p>

            <h2>Resepsi</h2>
            <p>13.00 – 17.00 WIB</p>
        </div>

      </div>

  </div>

</div>

<!-- sound -->
<audio id="paperSound" src="https://assets.mixkit.co/active_storage/sfx/1105/1105-preview.mp3" preload="auto"></audio>


<script>
const envelope = document.getElementById("envelope");
const sound = document.getElementById("paperSound");

envelope.addEventListener("click", () => {
  envelope.classList.toggle("open");

  sound.currentTime = 0;
  sound.volume = 0.25;
  sound.play();
});
</script>

</body>
</html>
